version: 2

updates:
  # Maven dependencies for a multi-module repo.
  # Scan the repository root. Add separate update entries for module directories if needed.
  - package-ecosystem: "maven"
    directory: "/"
      # If some modules need independent scanning, add additional `updates` entries such as:
      # directory: "/service-a"
      # directory: "/service-b"
      # directory: "/libs/common"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Berlin"

    open-pull-requests-limit: 10

    labels:
      - "dependencies"
      - "maven"

    commit-message:
      prefix: "deps"
      include: "scope"

    groups:
      maven-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions versions in .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"

    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Europe/Berlin"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"
      - "github-actions"

    commit-message:
      prefix: "ci"
      include: "scope"

    groups:
      github-actions:
        patterns:
          - "*"
